version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: revenue-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: revenue-pwa

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: revenue-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/revenue-pwa
      JWT_SECRET: change_this_in_production_super_secret
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@agency.com
      ADMIN_PASSWORD: Admin@123
      NODE_ENV: production
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: revenue-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
